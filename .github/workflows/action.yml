name : Orion-K 
run-name: ${{github.actor}}'s workflows
on : 
  push :
    tag :
      - "v*"
jobs:
  build-image:
    runs-on : ubuntu-latest
    steps :
      - name: Login GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}

      - name: Build docker image to push 
        run: docker build . -t ghcr.io/${{github.actor}}/orion-k:latest

      - name: Push docker image to container registry
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ghcr.io/${{github.actor}}/orion-k:latest
          run: docker push ghcr.io/${{github.actor}}/orion-k:latest 
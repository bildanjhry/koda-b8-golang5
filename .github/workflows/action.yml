name : Orion-K 
run-name: ${{github.actor}}'s workflows
on : 
  push :
    tags :
      - "v*"
jobs:
  build-image:
    runs-on : ubuntu-latest
    steps :
      - name : Checkout Source Code
        uses: actions/checkout@v6

      - name: Login GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}

      - name: Build docker image to push 
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          run: docker build . -t ghcr.io/${{github.actor}}/orion-k:latest

      - name: Push docker image to container registry
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          run: docker push ghcr.io/${{github.actor}}/orion-k:latest 
      
  uploads-artifact:
    runs-on: ubuntu-latest
    steps:
      - name: Prepare
        uses: actions/checkout@v4

      - name: setup golang
        uses: actions/setup-go@v6
        with:
            go-version-file: go.mod

      - name: Install all Deps
        run : go mod tidy

      - name: Build App
        run : go build -o orion_k main.go

      - name: Uploads Artifact
        uses: actions/upload-artifact@v7
        with:
          name: orion-k
          id: orion-k-id
          path: orion_k

  release-app:
    runs-on: ubuntu-latest
    needs: uploads-artifact
    steps:
      - name: Login GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}

      - name: Download Artifact
        uses: actions/download-artifact@v8
        with:
          name: orion-k
          path: orion_k

      - name: Compress Artifact
        run: zip -r orion-k.zip ./*

      - name: Release Final App
        uses: softprops/action-gh-release@v3
        with:
          files: |
            orion-k.zip
  
  release-binnary-app:
    runs-on: ubuntu-latest
    steps: 
      - name: Get Source
        uses : actions/checkout@v4

      - name: setup golang
        uses: actions/setup-go@v6
        with:
            go-version-file: go.mod

      - name: Install all Deps
        run : go mod tidy

      - name: Build Linux App
        run : go build -o orion_k-linux-amd64 main.go

      - name: Build Windows App
        run: GOOS=windows GOARCH=amd64 go build -o orion_k-windows.exe main.go
      
      - name: Build MacOS ARM64 App
        run: GOOS=darwin GOARCH=arm64 go build -o orion_k-darwin-arm64 main.go  

      - name: Release Final App
        uses: softprops/action-gh-release@v3
        with:
          files: |
            orion_k-linux-amd64
            orion_k-windows.exe
            orion_k-darwin-arm64
